# Cloud Build configuration for frontend
# Usage: gcloud builds submit --config=cloudbuild.yaml

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "VITE_API_BASE_URL=${_VITE_API_BASE_URL}"
      - "-t"
      - "gcr.io/$PROJECT_ID/lms-frontend:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/lms-frontend:latest"
      - "."
    dir: "frontend"

  # Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/lms-frontend:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/lms-frontend:latest"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "lms-frontend"
      - "--image"
      - "gcr.io/$PROJECT_ID/lms-frontend:$SHORT_SHA"
      - "--platform"
      - "managed"
      - "--region"
      - "${_REGION}"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"

images:
  - "gcr.io/$PROJECT_ID/lms-frontend:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/lms-frontend:latest"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-central1"
  _VITE_API_BASE_URL: "https://learnhub-backend-882950565528.us-central1.run.app/api" # Update with your backend URL

