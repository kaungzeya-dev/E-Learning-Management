spring.application.name=lms_e_learn

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lms_elearn_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lms_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lms_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server Configuration (Railway sets PORT; SERVER_PORT kept for local/docker-compose)
server.port=${PORT:${SERVER_PORT:8080}}

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:ZmFrZV9qb3Nlc19zZWNyZXRfMzJieXRlc19iYXNlNjQ=}
app.jwt.expirationMs=${APP_JWT_EXPIRATION_MS:86400000}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
file.upload-dir=${FILE_UPLOAD_DIR:./uploads/course-content}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}

# Local overrides (optional). Processed after this file so keys in .env.local win.
spring.config.import=optional:file:.env.local